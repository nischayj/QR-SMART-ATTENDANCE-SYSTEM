<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QR Smart Attendance System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        font-family:Arial, sans-serif;
        }

        .header{
        background:linear-gradient(135deg,#2c3e50,#4ca1af);
        color:white;
        padding:25px;
        text-align:center;
        margin-bottom:30px;
        }

        .card{
        border-radius:12px;
        box-shadow:0 6px 15px rgba(0,0,0,0.1);
        }

        .stat-card{
        text-align:center;
        padding:20px;
        }

        .stat-number{
        font-size:32px;
        font-weight:bold;
        color:#007bff;
        }

        .qr-box{
        text-align:center;
        margin-top:20px;
        }

    </style>

</head>


<body>


<div class="header">

    <h2>QR Smart Attendance System</h2>
    <p>Spring Boot Full Stack Project</p>

</div>


<div class="container">


    <div class="row mb-4">


        <div class="col-md-4">

            <div class="card stat-card">

                <h5>Total Students</h5>

                <div id="totalStudents" class="stat-number">0</div>

            </div>

        </div>


        <div class="col-md-4">

            <div class="card stat-card">

                <h5>Total Sessions</h5>

                <div class="stat-number">1</div>

            </div>

        </div>


        <div class="col-md-4">

            <div class="card stat-card">

                <h5>Attendance Today</h5>

                <div class="stat-number">0</div>

            </div>

        </div>


    </div>



    <div class="row">


        <div class="col-md-4">

            <div class="card p-4">

                <h4>Add Student</h4>

                <input id="name" class="form-control mb-2" placeholder="Student Name">

                <input id="email" class="form-control mb-2" placeholder="Email">

                <input id="password" class="form-control mb-3" placeholder="Password">

                <button onclick="addStudent()" class="btn btn-primary w-100">

                    Add Student

                </button>

            </div>

        </div>



        <div class="col-md-8">

            <div class="card p-4">

                <div class="d-flex justify-content-between">

                    <h4>Students List</h4>

                    <button onclick="loadStudents()" class="btn btn-success">

                        Refresh

                    </button>

                </div>


                <table class="table mt-3">

                    <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>

                    </tr>

                    </thead>

                    <tbody id="studentTable">

                    </tbody>

                </table>

            </div>

        </div>


    </div>



    <div class="card p-4 mt-4">

        <h4>Generate Attendance QR</h4>
        <br><br>

        <button onclick="markAttendance()" class="btn btn-success">
            Mark Attendance (Simulate Scan)
        </button>

        <input id="sessionText" class="form-control mb-3" placeholder="Enter Session Name">

        <button onclick="generateQR()" class="btn btn-dark">

            Generate QR

        </button>


        <div class="qr-box">

            <img id="qrImage" width="220">

        </div>


    </div>


</div>


<script src="script.js"></script>

</body>

</html>
